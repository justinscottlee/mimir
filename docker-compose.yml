services:
  postgres:
    image: postgres:16-alpine
    container_name: mimir-postgres
    environment:
      POSTGRES_USER: mimir
      POSTGRES_PASSWORD: mimir
      POSTGRES_DB: mimir
    ports:
      - "5432:5432"
    volumes:
      - mimir-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimir -d mimir"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: mimir-valkey
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - mimir-valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/config:/etc/searxng/
    restart: unless-stopped

volumes:
  mimir-pgdata:
  mimir-valkeydata:
